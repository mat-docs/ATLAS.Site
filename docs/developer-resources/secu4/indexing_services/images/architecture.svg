<svg viewBox="0 0 850 480" xmlns="http://www.w3.org/2000/svg">
  <!-- Arrow marker definitions - must come first -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#666"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#ed6d20"/>
    </marker>
  </defs>
  
  <!-- Client Applications -->
  <rect x="150" y="20" width="550" height="50" fill="#ffe8dc" stroke="#ed6d20" stroke-width="2" rx="5"/>
  <text x="425" y="50" font-size="16" font-weight="bold" text-anchor="middle" fill="#000">Client Applications</text>
  
  <!-- REST API arrows -->
  <line x1="250" y1="70" x2="250" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="70" x2="600" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="230" y="95" font-size="12" fill="#666">REST API</text>
  <text x="620" y="95" font-size="12" fill="#666">REST API</text>
  
  <!-- Files Service -->
  <rect x="50" y="110" width="380" height="120" fill="#f5f5f5" stroke="#ed6d20" stroke-width="2" rx="5"/>
  <text x="240" y="135" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">Files Service (5000)</text>
  <text x="70" y="160" font-size="12" fill="#333">- File Discovery</text>
  <text x="70" y="180" font-size="12" fill="#333">- Metadata Extraction</text>
  <text x="70" y="200" font-size="12" fill="#333">- Status Tracking</text>
  <text x="70" y="220" font-size="12" fill="#333">- Search &amp; Query</text>
  
  <!-- Configs Service -->
  <rect x="470" y="110" width="330" height="120" fill="#f5f5f5" stroke="#ed6d20" stroke-width="2" rx="5"/>
  <text x="635" y="135" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">Configs Service (5050)</text>
  <text x="490" y="160" font-size="12" fill="#333">- CFG File Processing</text>
  <text x="490" y="180" font-size="12" fill="#333">- PGV File Processing</text>
  <text x="490" y="200" font-size="12" fill="#333">- Relationship Mapping</text>
  <text x="490" y="220" font-size="12" fill="#333">- Specialized Queries</text>
  
  <!-- Notification Messages between services -->
  <line x1="430" y1="160" x2="470" y2="160" stroke="#ed6d20" stroke-width="2" marker-end="url(#arrowhead-orange)" stroke-dasharray="5,5"/>
  <text x="435" y="150" font-size="11" fill="#ed6d20" font-weight="bold">Notification</text>
  <text x="440" y="175" font-size="10" fill="#ed6d20">Messages</text>
  
  <!-- Files DB arrow -->
  <line x1="240" y1="230" x2="240" y2="300" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Configs DB arrow -->
  <line x1="635" y1="230" x2="635" y2="300" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Files Database -->
  <rect x="180" y="300" width="120" height="100" fill="#ffe8dc" stroke="#ed6d20" stroke-width="2" rx="5"/>
  <text x="240" y="330" font-size="13" font-weight="bold" text-anchor="middle" fill="#000">MongoDB</text>
  <text x="240" y="355" font-size="12" text-anchor="middle" fill="#333">or</text>
  <text x="240" y="375" font-size="13" font-weight="bold" text-anchor="middle" fill="#000">LiteDB</text>
  <text x="240" y="390" font-size="10" text-anchor="middle" fill="#666">(Files DB)</text>
  
  <!-- Configs Database -->
  <rect x="575" y="300" width="120" height="100" fill="#ffe8dc" stroke="#ed6d20" stroke-width="2" rx="5"/>
  <text x="635" y="330" font-size="13" font-weight="bold" text-anchor="middle" fill="#000">MongoDB</text>
  <text x="635" y="355" font-size="12" text-anchor="middle" fill="#333">or</text>
  <text x="635" y="375" font-size="13" font-weight="bold" text-anchor="middle" fill="#000">LiteDB</text>
  <text x="635" y="390" font-size="10" text-anchor="middle" fill="#666">(Configs DB)</text>
  
  <!-- Legend -->
  <text x="50" y="440" font-size="11" fill="#666" font-style="italic">Note: Files Service notifies Configs Service when CFG/PGV files are discovered</text>
</svg>
